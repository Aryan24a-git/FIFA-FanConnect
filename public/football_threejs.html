<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_3 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_3" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_3');
  
  // 3D Liquid Glass Football for FIFA FanConnect
  const scene = new THREE.Scene();
  const containerWidth = container.clientWidth || window.innerWidth;
  const containerHeight = container.clientHeight || window.innerHeight;
  const camera = new THREE.PerspectiveCamera(45, containerWidth / containerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

  renderer.setSize(containerWidth, containerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  container.appendChild(renderer.domElement);

  // Football Geometry - Liquid Glass Style (Using Icosahedron level 1 for classic hex/pentagon panels)
  const geometry = new THREE.IcosahedronGeometry(2, 1); 
  
  // Outer Glass Shell
  const material = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      metalness: 0.1,
      roughness: 0.1,
      transmission: 0.9, // Glass effect
      thickness: 0.5,
      clearcoat: 1.0,
      clearcoatRoughness: 0.1,
      flatShading: true,
      transparent: true,
      opacity: 0.8
  });
  
  const footballGroup = new THREE.Group();
  footballGroup.position.x = 0.8;
  scene.add(footballGroup);

  const glassBall = new THREE.Mesh(geometry, material);
  footballGroup.add(glassBall);

  // Inner Core (Glowing)
  const innerGeo = new THREE.IcosahedronGeometry(1.95, 1);
  const innerMat = new THREE.MeshPhongMaterial({
      color: 0x00E5FF,
      flatShading: true,
      emissive: 0x005577,
      emissiveIntensity: 0.5
  });
  const innerBall = new THREE.Mesh(innerGeo, innerMat);
  footballGroup.add(innerBall);

  // Edges to emphasize football panels
  const edges = new THREE.EdgesGeometry(geometry);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x00E5FF, linewidth: 2, transparent: true, opacity: 0.8 });
  const lines = new THREE.LineSegments(edges, lineMat);
  footballGroup.add(lines);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0x404040, 2);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0xFFD700, 3, 50);
  pointLight.position.set(5, 5, 5);
  scene.add(pointLight);

  const blueLight = new THREE.PointLight(0x00E5FF, 3, 50);
  blueLight.position.set(-5, -5, 5);
  scene.add(blueLight);

  camera.position.z = 8;

  // Interactive Movement Variables
  let targetRotationX = 0;
  let targetRotationY = 0;
  let mouseX = 0;
  let mouseY = 0;
  let currentSpeed = 0.005; // Base rotation speed
  const windowHalfX = window.innerWidth / 2;
  const windowHalfY = window.innerHeight / 2;

  // Mouse move event to control rotation speed and direction
  document.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX - windowHalfX) * 0.001;
      mouseY = (event.clientY - windowHalfY) * 0.001;
  });

  function animate() {
      requestAnimationFrame(animate);

      // Base auto-rotation
      footballGroup.rotation.y += currentSpeed;
      footballGroup.rotation.x += currentSpeed * 0.5;

      // Add interactive rotation based on mouse (smoothly interpolating)
      targetRotationY = mouseX * 2;
      targetRotationX = mouseY * 2;

      footballGroup.rotation.y += (targetRotationY - footballGroup.rotation.y) * 0.05;
      footballGroup.rotation.x += (targetRotationX - footballGroup.rotation.x) * 0.05;
      
      // Floating effect
      footballGroup.position.y = Math.sin(Date.now() * 0.002) * 0.2;

      renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
      const w = container.clientWidth || window.innerWidth;
      const h = container.clientHeight || window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
  });

  animate();

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_3 -->
</body>
</html>
